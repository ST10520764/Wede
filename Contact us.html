<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uthingo Ice - Contact</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="background:url(icy.jpg)">
    <header>
        <h1 align="center">Uthingo Ice</h1>
        <nav>
            <center>
                <a href="Home.html"><img src="pozi.jpg" width="90" height="90" alt="Home"></a>
                <a href="About us.html"><img src="us.jpg" width="90" height="90" alt="About Us"></a>
                <a href="Products.html"><img src="pro.jpg" width="90" height="90" alt="Products"></a>
                <a href="Contact us.html"><img src="call.jpg" width="90" height="90" alt="Contact Us"></a>
            </center>
            </nav>
    </header>

    <section>
    <center>
        <h2>Contact Us</h2>
        <p>Email: uthingoice@gmail.com</p>
        <p>Phone: +27 71 987 6543</p>
        <p>Owners: Nduna & Anne Madikane</p>

        
        <form id="contactForm" novalidate>
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" required>
            <span class="error" id="nameError"></span><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required>
            <span class="error" id="emailError"></span><br><br>

            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="5" cols="40" required></textarea>
            <span class="error" id="messageError"></span><br><br>

            <input type="submit" value="Send">
            <input type="reset" value="Clear">
        </form>
    </center>
</section>



    <footer>
        <p align="center">&copy; 2026 Uthingo Ice. All rights reserved.</p>
    </footer>
</body>
</html>
